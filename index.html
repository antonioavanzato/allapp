<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7">
  
  <title>AllApp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Экран авторизации (без изменений) -->
  <div id="auth-screen" class="screen">
      <!-- ... код auth-screen ... -->
  </div>

  <!-- Основное приложение -->
  <div id="main-app" class="screen hidden">
    <header class="header">
      <h1 id="page-title">Задачи</h1>
      <button id="logout-btn" class="text-btn">Выйти</button>
    </header>

    <main class="content">
      <div class="input-group">
        <input type="text" id="item-input" placeholder="Новая задача..." autocomplete="off">
        <button id="add-btn">+</button>
      </div>

      <!-- НОВЫЙ БЛОК ДЛЯ СПИСКА -->
      <div class="list-section">
        <h3 id="list-title" class="list-section-title">Все задачи</h3>
        <ul id="items-list">
          <!-- Карточки будут здесь -->
        </ul>
        <p id="empty-state" class="empty-state hidden">Здесь пока пусто</p>
      </div>

    </main>

    <nav class="bottom-nav">
        <!-- ... код bottom-nav ... -->
    </nav>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
