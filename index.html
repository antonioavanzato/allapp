<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-title" content="НАШ ДОМ">
  
  <title>НАШ ДОМ - Покупки, задачи, Альбус, Кофе</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192.png">
</head>
<body>
  <!-- Экран авторизации -->
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <h2>НАШ ДОМ</h2>
      <p class="auth-subtitle">Войдите, чтобы продолжить</p>
      
      <input type="email" id="email-input" placeholder="Email" autocomplete="email">
      <input type="password" id="password-input" placeholder="Пароль" autocomplete="current-password">
      
      <button id="login-btn" class="primary-btn">Войти</button>
      
      <p id="auth-error" class="error-text"></p>
    </div>
  </div>

  <!-- Основное приложение -->
  <div id="main-app" class="screen hidden">
    <header class="header">
      <h1 id="page-title">Покупки</h1>
      <div style="display: flex; gap: 6px; align-items: center;" id="header-shop-buttons">
        <!-- QR Магнит -->
        <button id="qr-magnit-btn" class="qr-icon-btn" title="QR-код Магнит">
          <img src="icons/magnit-logo.svg" alt="Магнит">
        </button>
        <!-- QR Пятёрочка -->
        <button id="qr-pyaterochka-btn" class="qr-icon-btn" title="QR-код Пятёрочка">
          <img src="icons/pyaterochka-logo.svg" alt="Пятёрочка">
        </button>
        <button id="logout-btn" class="text-btn">Выйти</button>
      </div>
    </header>

    <main class="content">
      <!-- Быстрые продукты -->
      <div id="quick-products-container" class="quick-products-section">
        <div class="quick-header" id="quick-toggle">
          <h4 class="quick-title">Быстрое добавление</h4>
          <span class="quick-arrow" id="quick-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <div class="quick-grid" id="quick-grid">
          <button class="quick-btn" data-product="Творог Савушкин 0,1%">Творог Савушкин 0,1%</button>
          <button class="quick-btn" data-product="Бананы">Бананы</button>
          <button class="quick-btn" data-product="Фарш">Фарш</button>
          <button class="quick-btn" data-product="Томаты Фламенко">Томаты Фламенко</button>
          <button class="quick-btn" data-product="Перетертые томаты">Перетертые томаты</button>
          <button class="quick-btn" data-product="Яйца">Яйца</button>
          <button class="quick-btn" data-product="Зелень для салата">Зелень для салата</button>
          <button class="quick-btn" data-product="Индейка Индилайт">Индейка Индилайт</button>
          <button class="quick-btn" data-product="Морковь">Морковь</button>
          <button class="quick-btn" data-product="Морковь по-корейски">Морковь по-корейски</button>
          <button class="quick-btn" data-product="Туалетная бумага">Туалетная бумага</button>
          <button class="quick-btn" data-product="Куриное филе">Куриное филе</button>
          <button class="quick-btn" data-product="Рис">Рис</button>
          <button class="quick-btn" data-product="Овсянка №2">Овсянка №2</button>
          <button class="quick-btn" data-product="Хлеб">Хлеб</button>
          <button class="quick-btn" data-product="Творожный сыр лёгкий">Творожный сыр лёгкий</button>
          <button class="quick-btn" data-product="Мусорные пакеты">Мусорные пакеты</button>
          <button class="quick-btn" data-product="Обычные пакеты">Обычные пакеты</button>
        </div>
      </div>

      <!-- Поле ввода -->
      <div class="input-group" id="input-group">
        <input type="text" id="item-input" placeholder="Что купить?.." autocomplete="off">
        <button id="add-btn">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 4v12M4 10h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Список -->
      <div class="list-section" id="list-section">
        <h3 id="list-title" class="list-section-title">Список покупок</h3>
        <ul id="items-list"></ul>
        <p id="empty-state" class="empty-state hidden">Здесь пока пусто</p>
      </div>

      <!-- Календарь Альбуса -->
      <div id="albus-calendar" class="calendar-container hidden">
        <div class="calendar-header">
          <button id="prev-month" class="calendar-nav">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M11 13L7 9l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span id="current-month" class="calendar-month-year"></span>
          <button id="next-month" class="calendar-nav">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M7 13l4-4-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="calendar-weekdays">
          <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
        </div>
        <div class="calendar-days" id="calendar-days"></div>
      </div>

      <!-- Кофе -->
      <div id="coffee-section" class="coffee-container hidden">
        <div class="coffee-form">
          <h3 class="coffee-title">Новый рецепт</h3>
          
          <input type="text" id="coffee-name" placeholder="Название" class="coffee-input">
          <input type="text" id="coffee-processing" placeholder="Обработка" class="coffee-input">
          
          <div class="coffee-row">
            <input type="text" id="coffee-roast-date" class="coffee-input coffee-date" placeholder="Дата обжарки" 
                   onfocus="this.type='date'" 
                   onblur="if(!this.value) this.type='text'; window.updateCoffeeAge?.()">
            <span class="coffee-age" id="coffee-age">— дней</span>
          </div>
          
          <div class="coffee-group">
            <input type="number" id="coffee-dose" placeholder="Дозировка (г)" class="coffee-input" step="0.1" min="0">
            <input type="number" id="coffee-grind" placeholder="Помол (клики)" class="coffee-input" step="1" min="0">
            <input type="number" id="coffee-temp" placeholder="Температура (°C)" class="coffee-input" step="0.1" min="0">
            <input type="number" id="coffee-water" placeholder="Общая вода (мл)" class="coffee-input" step="1" min="0">
          </div>
          
          <div class="coffee-chart-container">
            <h4 class="coffee-chart-title">График вливаний</h4>
            <canvas id="coffee-chart" class="coffee-chart" width="300" height="200"></canvas>
            <div class="coffee-points" id="coffee-points-list"></div>
            <div class="coffee-add-point">
              <input type="text" id="point-time" placeholder="Время (мм:сс)" class="coffee-input small">
              <input type="number" id="point-water" placeholder="Вода (мл)" class="coffee-input small" step="1" min="0">
              <button id="add-point-btn" class="coffee-small-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M8 3v10M3 8h10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>
          
          <button id="coffee-save" class="coffee-save-btn">Сохранить рецепт</button>
        </div>
        
        <div class="coffee-list">
          <h3 class="coffee-title">Сохранённые рецепты</h3>
          <div id="coffee-recipes-list"></div>
        </div>
      </div>
    </main>

    <!-- Нижняя навигация — SVG outline иконки -->
    <nav class="bottom-nav">
      <!-- Покупки: корзина -->
      <button class="nav-item active" data-tab="shopping">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 6h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Покупки</span>
      </button>

      <!-- Альбус: кот / лапа -->
      <button class="nav-item" data-tab="albus">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 14c-4 0-7 2-7 4v1h14v-1c0-2-3-4-7-4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="9" r="4" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 5.5C8 4 9 3 9 3s0 2 1.5 2M16 5.5C16 4 15 3 15 3s0 2-1.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span>Альбус</span>
      </button>

      <!-- Кофе: чашка -->
      <button class="nav-item" data-tab="coffee">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 8h1a4 4 0 010 8h-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 2v2M10 2v2M14 2v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>Кофе</span>
      </button>

      <!-- Задачи: галочка в круге -->
      <button class="nav-item" data-tab="tasks">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Задачи</span>
      </button>
    </nav>
  </div>

  <!-- Тост -->
  <div id="toast-message" class="toast hidden">✅ Добавлено</div>

  <script type="module" src="app.js"></script>
</body>
</html>
